
nc: 4           # example: whole_grain, broken, chalk, impurity
depth_multiple: 1.0
width_multiple: 1.0

backbone:
  # Stage 0 — stem
  - [-1, 1,  ConvBnAct,   [24, 3, 2]]            # 0  P1/2

  # Stage 1 — Fused-MBConv1 (shallow, no attention)
  - [-1, 2,  FusedMBConv, [24, 1, 0.0, 1]]       # 1

  # Stage 2 — Fused-MBConv4 (shallow, no attention)
  - [-1, 4,  FusedMBConv, [48, 4, 0.0, 2]]       # 2  P2/4

  # Stage 3 — Fused-MBConv4 (shallow, no attention) → P3
  - [-1, 4,  FusedMBConv, [64, 4, 0.0, 2]]       # 3  P3/8

  # Stage 4 — NAM-MBConv (deep; captures complex textures)
  - [-1, 6,  NAM_MBConv,  [128, 4, 2]]           # 4  P4/16
  # args: [c_out, expansion, stride]

  # Stage 5 — NAM-MBConv (deep) → P4
  - [-1, 9,  NAM_MBConv,  [160, 6, 1]]           # 5

  # Stage 6 — NAM-MBConv (deep)
  - [-1, 15, NAM_MBConv,  [256, 6, 2]]           # 6  P5/32

  # Stage 7 — SPPF → P5
  - [-1, 1,  SPPF,        [256, 5]]              # 7

neck:
  - [-1,        1, ConvBnAct,   [160, 1, 1]]      # 8
  - [-1,        1, nn.Upsample, [None, 2, nearest]] # 9
  - [[-1, 5],   1, Concat,      [1]]              # 10
  - [-1,        3, NAM_MBConv,  [160, 4, 1]]      # 11

  # P4 -> P3
  - [-1,        1, ConvBnAct,   [64, 1, 1]]       # 12
  - [-1,        1, nn.Upsample, [None, 2, nearest]] # 13
  - [[-1, 3],   1, Concat,      [1]]              # 14
  - [-1,        3, NAM_MBConv,  [64, 4, 1]]       # 15  small head

  # P3 -> P4
  - [-1,        1, FusedMBConv, [160, 4, 0.0, 2]] # 16
  - [[-1, 11],  1, Concat,      [1]]              # 17
  - [-1,        3, NAM_MBConv,  [160, 6, 1]]      # 18  medium head

  # P4 -> P5
  - [-1,        1, FusedMBConv, [256, 4, 0.0, 2]] # 19
  - [[-1, 7],   1, Concat,      [1]]              # 20
  - [-1,        3, NAM_MBConv,  [256, 6, 1]]      # 21  large headead

head:
  - [[15, 18, 21], 1, Detect, [nc]]


